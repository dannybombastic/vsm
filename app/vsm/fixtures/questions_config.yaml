categories:
  # ── 01 Developers ──────────────────────────────────────────────
  - name: Developers
    slug: developers
    color: "#2563eb"
    order: 1
    description: Backend & frontend development teams
    sections:
      - code: A
        title: "Team Identity"
        order: 1
        questions:
          - key: dev_a1
            label: "Team name and main responsibility"
            type: text
          - key: dev_a2
            label: "Team members and roles"
            type: textarea
          - key: dev_a3
            label: "Who is the direct client (consumer) of your deliverables?"
            type: text
          - key: dev_a4
            label: "Who are the suppliers that feed your process?"
            type: text

      - code: B
        title: "Process Steps"
        order: 2
        questions:
          - key: dev_b1_feature
            label: "Describe the steps for implementing a new feature (from requirement to production)"
            type: textarea
          - key: dev_b1_table
            label: "Feature Process Metrics"
            type: table
            options:
              columns: ["Step", "Avg Duration", "Wait Time", "% Complete & Accurate", "Who"]
          - key: dev_b2_bugfix
            label: "Describe the steps for fixing a production bug"
            type: textarea
          - key: dev_b2_table
            label: "Bug Fix Process Metrics"
            type: table
            options:
              columns: ["Step", "Avg Duration", "Wait Time", "% Complete & Accurate", "Who"]
          - key: dev_b3_review
            label: "Describe your code review / PR process"
            type: textarea

      - code: C
        title: "Handoffs & Dependencies"
        order: 3
        questions:
          - key: dev_c1
            label: "What do you receive from upstream teams, and in what format?"
            type: textarea
          - key: dev_c2
            label: "What do you deliver downstream, and to whom?"
            type: textarea
          - key: dev_c3
            label: "Where do most bottlenecks or wait times occur?"
            type: textarea
          - key: dev_c4
            label: "Handoff quality: how often do you receive incomplete information?"
            type: checklist
            options:
              - "Rarely (<10%)"
              - "Sometimes (10-30%)"
              - "Often (30-60%)"
              - "Very often (>60%)"

      - code: D
        title: "Pain Points & Waste"
        order: 4
        questions:
          - key: dev_d1
            label: "Top 3 sources of waste or rework in your process"
            type: textarea
          - key: dev_d2
            label: "What types of waste do you observe most?"
            type: checklist
            options:
              - "Waiting / Idle time"
              - "Rework / Defects"
              - "Context switching"
              - "Manual processes"
              - "Unnecessary handoffs"
              - "Over-engineering"
              - "Incomplete requirements"

      - code: E
        title: "Tools & Systems"
        order: 5
        questions:
          - key: dev_e1
            label: "Primary tools used across the development lifecycle"
            type: textarea
          - key: dev_e2
            label: "Integration pain points between tools"
            type: textarea

      - code: F
        title: "Improvement Ideas"
        order: 6
        questions:
          - key: dev_f1
            label: "If you could change one thing to improve flow, what would it be?"
            type: textarea
          - key: dev_f2
            label: "Quick wins that require minimal investment"
            type: textarea

      - code: G
        title: "VSM Metrics (for automated map generation)"
        order: 7
        questions:
          - key: dev_g1_work_time
            label: "Average total work time (touch/process time) for your main deliverable, in hours"
            type: text
            order: 1
          - key: dev_g2_wait_time
            label: "Average wait time before you can start working after receiving a request, in hours"
            type: text
            order: 2
          - key: dev_g3_rework_pct
            label: "What percentage of work typically requires rework/corrections? (0-100)"
            type: text
            order: 3
          - key: dev_g4_people
            label: "Typical number of people involved in your main process"
            type: text
            order: 4
          - key: dev_g5_flow
            label: "How does work typically arrive to your team?"
            type: checklist
            order: 5
            options:
              - "Push (assigned/directed to us)"
              - "Pull (we pick from a queue/backlog)"
          - key: dev_g6_steps
            label: "Detailed per-step timing for your main process"
            type: table
            order: 6
            options:
              columns: ["Step Name", "Work Time (hours)", "Wait Time (hours)", "Rework %", "People"]

